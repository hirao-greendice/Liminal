<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liminal Tablet System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="viewport" aria-label="Puzzle tablet viewport">
    <div id="stage-shell">
      <section id="stage" aria-live="polite">
        <img id="screen-image" src="" alt="Current puzzle screen" draggable="false" />
        <section id="scene2-ui" aria-label="Search scene">
          <div class="scene2-panel">
            <form id="scene2-search-form" class="scene2-search-row">
              <input
                id="scene2-search-input"
                class="scene2-search-input"
                type="search"
                name="query"
                lang="ja"
                placeholder="検索ワードを入力"
                autocomplete="off"
                autocapitalize="off"
                autocorrect="off"
                spellcheck="false"
              />
              <button id="scene2-search-button" class="scene2-search-button" type="submit">SEARCH</button>
              <button id="scene2-close-button" class="scene2-close-button" type="button" aria-label="シーン1に戻る">×</button>
            </form>
            <section id="scene2-results" class="scene2-results" aria-live="polite">
              <div id="scene2-results-body" class="scene2-results-body">
                <p>検索結果は未設定です。</p>
              </div>
            </section>
          </div>
        </section>
        <div id="hotspot-layer" aria-hidden="true"></div>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
